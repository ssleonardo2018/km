<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Dashboard - KM Diário</title>
</head>
<body>
    <nav>
       <div class="user-info">
            Olá, <span id="user-name">Carregando...</span> 👤
        </div>
        <h1>KM Diário</h1>
        <button onclick="logout()">Sair</button>
    </nav>

     <div class="dashboard-stats">
        <div class="stat-card">
            <h3>KM Total (Mês)</h3>
            <p id="total-km-mes">0.00 km</p>
        </div>
        <div class="stat-card">
            <h3>Registros Realizados</h3>
            <p id="total-registros">0</p>
        </div>
    </div>

    <!-- Menu de Navegação Rápida -->
    <div class="menu-navegacao">
        <button class="menu-btn" onclick="abrirModalVeiculo()">🚗 Registrar Veículo</button>
        <button class="menu-btn active">📊 Registrar KM Diário</button>
        <button class="menu-btn" onclick="window.location.href='/relatorios'">📋 Relatórios</button>
        <button class="menu-btn" onclick="window.location.href='/perfil'">👤 Meu Perfil</button>
    </div>   


    <div class="container">
        <h2>🚚 Novo Registro de KM</h2>
        <form id="form-registro">
            <div class="form-group">
                <label>Veículo:</label>
                <select id="select-veiculos" required>
                    <option value="">Selecione o veículo...</option>
                </select>
            </div>

            <div class="form-group">
                <label>KM Inicial:</label>
                <input type="number" id="km_inicial" required>
            </div>

            <div class="form-group">
                <label>KM Final:</label>
                <input type="number" id="km_final" required>
            </div>

            <div class="form-group">
                <label>Atividade/Observação:</label>
                <textarea id="observacao" rows="3"></textarea>
            </div>

            <button type="submit" class="btn-save">Salvar Registro</button>
        </form>
        <p id="feedback"></p>
    </div>

    <!-- Estrutura do Modal (Janela Flutuante) -->
    <div id="modal-veiculo" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModalVeiculo()">&times;</span>
            <h2>🚚 Cadastrar Novo Veículo</h2>
            <form id="form-veiculo">
                
                <div class="form-group">
                    <label>Placa:</label>
                    <input type="text" id="v_placa" placeholder="ABC1234" required>
                </div>
                <div class="form-group">
                    <label>Nº do Carro:</label>
                    <input type="number" id="v_numero" placeholder="001">
                </div>
                <button type="submit" class="btn-save">Confirmar Cadastro</button>
            </form>
        </div>
    </div>

    <hr>

    <div class="content">
        <h3>Histórico Recente</h3>
        <ul id="lista-registros"></ul>
    </div>



    <div class="content">
        <h3>Veículos Cadastrados</h3>
        <ul id="lista-veiculos"></ul>
    </div>
    <script src="/static/script.js"></script>
    <script>window.onload = carregarDados;</script>
</body>
</html>
