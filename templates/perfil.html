<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
    <title>Meu Perfil - KM Diário</title>
</head>
<body>
    <nav>
        <div class="user-info">👤 Perfil de <span id="user-display">...</span></div>
        <button onclick="window.location.href='/dashboard'">Voltar ao Painel</button>
    </nav>

    <div class="container">
        <h2>⚙️ Configurações da Conta</h2>
        
        <!-- Alterar E-mail -->
        <div class="profile-section">
            <h3>Alterar E-mail</h3>
            <div class="form-group">
                <label>Novo E-mail:</label>
                <input type="email" id="novo-email" placeholder="exemplo@email.com">
            </div>
            <button class="btn-save" onclick="atualizarEmail()">Atualizar E-mail</button>
        </div>

        <hr>

        <!-- Alterar Senha -->
        <div class="profile-section">
            <h3>Alterar Senha</h3>
            <div class="form-group">
                <label>Nova Senha (mín. 6 caracteres):</label>
                <input type="password" id="nova-senha" placeholder="******">
            </div>
            <button class="btn-save" style="background-color: var(--secondary-color);" onclick="atualizarSenha()">Atualizar Senha</button>
        </div>
        
        <p id="perfil-feedback"></p>
    </div>

    <script src="/static/script.js"></script>
    <script>
        window.onload = () => {
            const email = localStorage.getItem('user_email');
            document.getElementById('user-display').innerText = email;
        };
    </script>
</body>
</html>
